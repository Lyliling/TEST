<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시즈쿠</title>
    <style>
        /* 기본 설정 및 보안 */
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 40px; height: 100vh; background-color: #1a1a1a;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            color: white; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        #textbox::-webkit-scrollbar, .modal-content::-webkit-scrollbar { display: none; }
        #textbox, .modal-content { -ms-overflow-style: none; scrollbar-width: none; }

        #game-container {
            width: 100%; max-width: 800px; aspect-ratio: 640 / 480;
            background-color: black; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 1px solid #333;
        }

        /* 연출: 흔들기 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-effect { animation: shake 0.5s; }

        /* 연출: 엔딩 크레딧 애니메이션 */
        @keyframes scroll-up {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-160%); }
        }

        /* 타이틀 화면 레이아웃 (중앙 정렬 보완) */
        #title-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        h1 { 
            font-size: 3rem; 
            margin-bottom: 6rem; 
            letter-spacing: 0.2rem; 
            transform: translateY(-20px); 
            font-weight: normal;
            margin-left: 30px; 
            text-align: center;
        }

        .menu-container { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            align-items: center;
        }
        
        .menu-item, .slot, .choice-btn {
            cursor: pointer; transition: all 0.3s ease; user-select: none;
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        .menu-item { font-size: 1.5rem; padding: 5px 20px; }
        .slot { border: 1px solid #555; font-size: 1.1rem; padding: 12px 20px; width: 100%; max-width: 500px; }
        .choice-btn {
            width: 60%; padding: 15px; background: rgba(30, 30, 30, 0.9);
            border: 1px solid white; color: white; font-size: 1.2rem;
        }

        .hover-active:hover { color: #ccc; transform: translateX(10px); }
        .hover-active::before {
            content: '▷'; margin-right: 10px; opacity: 0; transition: opacity 0.3s;
        }
        .hover-active:hover::before { opacity: 1; }

        .ending-item {
            border: 1px solid #333; font-size: 1.1rem; padding: 12px 20px; 
            width: 100%; max-width: 500px; color: #aaa; text-align: center;
        }

        #play-screen {
            display: none; width: 100%; height: 100%;
            flex-direction: column; justify-content: flex-start;
            align-items: center; cursor: pointer; padding: 10px; box-sizing: border-box;
        }
        #textbox {
            width: 100%; height: calc(100% - 55px);
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px; box-sizing: border-box; position: relative; z-index: 2; overflow-y: auto;
        }
        #game-text { line-height: 1.8; margin: 0; word-break: keep-all; white-space: pre-wrap; transition: font-size 0.2s; }
        
        #choice-container {
            position: absolute; top: 10px; left: 10px; 
            width: calc(100% - 20px); height: calc(100% - 65px);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.6); z-index: 10; gap: 20px;
        }

        #game-ui {
            position: absolute; bottom: 5px; right: 10px; left: 10px;
            display: none; justify-content: flex-end; gap: 15px; z-index: 20;
            padding: 5px 10px;
        }
        .ui-btn {
            background: none; border: none; color: rgba(255,255,255,0.5);
            padding: 5px; cursor: pointer; font-size: 0.85rem; font-weight: bold;
        }
        .ui-btn:hover { color: white; }
        .ui-btn.active { color: #ffeb3b; }

        .modal {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 100; flex-direction: column; justify-content: center; align-items: center;
        }
        .modal-content { width: 80%; max-height: 80%; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 20px; align-items: center; }
        #modal-close-btn { margin-top: 20px; cursor: pointer; color: #aaa; font-size: 1.1rem; }

        #credit-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 200; display: none;
            flex-direction: column; align-items: center; overflow: hidden;
        }
        #credit-content {
            position: absolute; text-align: center; width: 100%;
            line-height: 3; font-size: 1.2rem; color: white;
        }
        .scrolling { animation: scroll-up 8s linear forwards; }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="game-container">
        <div id="title-screen">
            <h1>  시즈쿠</h1>
            <div class="menu-container">
                <div class="menu-item hover-active" onclick="startGame()">처음부터</div>
                <div class="menu-item hover-active" onclick="loadGameMenu()">이어하기</div>
                <div class="menu-item hover-active" onclick="openSystemMenu()">환경설정</div>
                <div class="menu-item hover-active" onclick="openEndingList()">엔딩목록</div>
                <div class="menu-item hover-active" onclick="openMakerInfo()">오마케</div>
            </div> </div>

        <div id="play-screen" onclick="handleScreenClick()">
            <div id="textbox"><p id="game-text"></p></div>
        </div>

        <div id="choice-container"></div>

        <div id="game-ui">
            <span id="auto-btn" class="ui-btn" onclick="event.stopPropagation(); toggleAuto()">AUTO</span>
            <span class="ui-btn" onclick="event.stopPropagation(); openBacklog()">BACKLOG</span>
            <span class="ui-btn" onclick="event.stopPropagation(); saveGameMenu()">SAVE</span>
            <span class="ui-btn" onclick="event.stopPropagation(); loadGameMenu()">LOAD</span>
            <span class="ui-btn" onclick="event.stopPropagation(); openSystemMenu()">MENU</span>
        </div>

        <div id="modal" class="modal">
            <div id="modal-body" class="modal-content"></div>
            <div id="modal-close-btn" onclick="closeModal()">[ 닫기 ]</div>
        </div>

        <div id="credit-screen">
            <div id="credit-content">
                <p style="font-size: 2rem; margin-bottom: 50px;">- STAFF -</p>
                <p>시나리오 : 사용자님</p>
                <p>프로그래밍 : Gemini AI</p>
                <p>총괄 디렉터 : 사용자님</p>
                <br><br>
                <p>도움을 주신 분들</p>
                <p>당신 (Player)</p>
                <br><br><br>
                <p style="font-size: 1.5rem;">플레이해주셔서 감사합니다</p>
            </div>
        </div>
    </div>

    <script>
        const scripts = [
            /* 0 */ { text: "- 서장 -" },
            /* 1 */ { text: "저기, 선배?" },
            /* 2 */ { text: "저, 처음에는 선배의 겉모습에 끌린 것 뿐이었어요." },
            /* 3 */ { text: "생일이라던가 혈액형이라던가, 그런 것들을 필사적으로 수첩에 메모하고 있던 것도." },
            /* 4 */ { text: "프로이트의 어려운 책을 철야로 읽었던 것도, 클래식 CD를 모으고 있다고 거짓말 했던 것도." },
            /* 4 */ { text: "그리고 학생회에 들어갔던 것도······" },
            /* 4 */ { text: "조금이라도 선배에게 다가가고 싶었으니까, 조금이라도 선배가 좋아할만한 타입의 여자애가 되고 싶어서 그랬던 거였어요." },
            /* 4 */ { text: "작년 가을, 선배에게 고백해서 OK라고 선배가 말해주어서, 연인이 될 수 있었어서." },
            /* 4 */ { text: "정말로, 제가 선배에 대해서 세상에서 제일 잘 알고 있는 여자애라고." },
            /* 4 */ { text: "착각, 하고 있었어요." },
            /* 4 */ { text: "그래도요, 선배? 저, 선배에 대해 정말로 잘 알게 되었어요." },
            /* 4 */ { text: "선배의 흉터." },
            /* 4 */ { text: "고통에 비명을 지르는 선배의 마음." },
            /* 4 */ { text: "선배가 도움을 바라고 있다는 것." },
            /* 4 */ { text: "선배는 눈치채지 못 하고 계실지도 모르겠지만, 선배의 '전파'를 수신한 상대는, 선배에 대해 잘 알게 되요." },
            /* 4 */ { text: "아, 어쩌면 저만이 특별한 걸지도······ 만약 그런 거라면, 기쁠 것 같아요." },
            /* 4 */ { text: "그래서 저는 선배가 저를 장난감 취급하고 있는 것도 알고 있어요." },
            /* 4 */ { text: "하지만 괜찮아요." },
            /* 4 */ { text: "저를 껴안아주던 선배는, 선배니까." },
            /* 4 */ { text: "제가 선배에 대해 잘 알게된 것 처럼, 선배도 언젠가는 저를 잘 알게 될 지도 모르니까." },
            /* 4 */ { text: "선배가 지금도 너무 좋아요." },
            /* 4 */ { text: "저, 제가 선배의 상처를 나아지게 해줄 수 있을 줄 알았어요." },
            /* 4 */ { text: "이렇게나 선배가 좋고 또 좋으니까." },
            /* 4 */ { text: "믿음을 가지면 분명 선배에게 닿을 거라고 믿었어요." },
            /* 4 */ { text: "하지만 선배는 저에게 그런 것을 바라고 있지 않으셨던 거죠?" },
            /* 4 */ { text: "어젯밤, 제가 선배의 집에 찾아갔더니, 선배, 무척이나 화를 내셨죠." },
            /* 4 */ { text: "「너하고는 이제 끝이야!」" },
            /* 4 */ { text: "라며. 무척 화를 내셨죠." },
            /* 4 */ { text: "진심이 아니어도 좋으니까······ 거짓말이라도 좋으니까 꼭 껴안아주시길 바랬어요." },
            /* 4 */ { text: "어라? 눈물이?" },
            


        ];

        let currentIdx = -1;
        let isTyping = false;
        let typingTimer = null;
        let autoMode = false;
        let autoTimer = null;
        let backlog = [];
        let isChoiceShowing = false;
        let currentEndingTitle = "";

        let aff_A = 0, aff_B = 0, aff_C = 0;

        let savedSize = localStorage.getItem('game_font_size') || '1.7';
        document.getElementById('game-text').style.fontSize = savedSize + "rem";

        function startGame() {
            currentIdx = -1; backlog = []; autoMode = false;
            aff_A = 0; aff_B = 0; aff_C = 0; currentEndingTitle = "";
            document.getElementById('auto-btn').classList.remove('active');
            document.getElementById('title-screen').style.display = 'none';
            document.getElementById('play-screen').style.display = 'flex';
            document.getElementById('game-ui').style.display = 'flex';
            document.getElementById('choice-container').style.display = 'none';
            document.getElementById('credit-screen').style.display = 'none';
            isChoiceShowing = false;
            nextScript();
        }

        function handleScreenClick() {
            if (isChoiceShowing) return;
            if (autoTimer) clearTimeout(autoTimer);
            if (isTyping) {
                clearTimeout(typingTimer);
                document.getElementById('game-text').innerText = scripts[currentIdx].text;
                isTyping = false;
                checkAfterTyping();
            } else {
                if (scripts[currentIdx] && scripts[currentIdx].end) {
                    startCredits();
                    return;
                }
                nextScript(); 
            }
        }

        function toggleAuto() {
            if (isChoiceShowing) return;
            autoMode = !autoMode;
            document.getElementById('auto-btn').classList.toggle('active', autoMode);
            if (autoMode && !isTyping) startAutoTimer();
            else if (!autoMode && autoTimer) clearTimeout(autoTimer);
        }

        function startAutoTimer() {
            if (autoTimer) clearTimeout(autoTimer);
            autoTimer = setTimeout(() => {
                if (autoMode && !isTyping && !isChoiceShowing) {
                    if (scripts[currentIdx] && scripts[currentIdx].end) return;
                    nextScript();
                }
            }, 1500);
        }

        function nextScript(targetIdx = null) {
            if (targetIdx !== null) currentIdx = targetIdx;
            else currentIdx++;

            if (currentIdx < scripts.length) {
                const data = scripts[currentIdx];
                backlog.push(data.text);
                if (data.shake) {
                    const container = document.getElementById('game-container');
                    container.classList.add('shake-effect');
                    setTimeout(() => container.classList.remove('shake-effect'), 500);
                }
                startTyping(data.text);
            } else {
                location.reload();
            }
        }

        function startTyping(text) {
            isTyping = true;
            const target = document.getElementById('game-text');
            target.innerText = "";
            let charIdx = 0;
            function type() {
                if (charIdx < text.length) {
                    target.innerText = text.substring(0, charIdx + 1);
                    charIdx++;
                    typingTimer = setTimeout(type, 40);
                } else {
                    isTyping = false;
                    checkAfterTyping();
                }
            }
            type();
        }

        function checkAfterTyping() {
            const data = scripts[currentIdx];
            if (data.options) {
                showChoices(data.options);
            } else if (data.end) {
                unlockEnding(currentEndingTitle);
                if (autoMode) toggleAuto();
            } else if (autoMode) {
                startAutoTimer();
            }
        }

        function unlockEnding(title) {
            if (!title) return;
            let unlocked = JSON.parse(localStorage.getItem('game_endings')) || [];
            if (!unlocked.includes(title)) {
                unlocked.push(title);
                localStorage.setItem('game_endings', JSON.stringify(unlocked));
            }
        }

        function showChoices(options) {
            isChoiceShowing = true;
            if (autoMode) toggleAuto();
            const container = document.getElementById('choice-container');
            container.innerHTML = "";
            container.style.display = "flex";
            
            options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = "choice-btn hover-active";
                btn.innerText = opt.label;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    if(opt.title) currentEndingTitle = opt.title;
                    if(opt.target === "A") aff_A += opt.score;
                    if(opt.target === "B") aff_B += opt.score;
                    if(opt.target === "C") aff_C += opt.score;
                    container.style.display = "none";
                    isChoiceShowing = false;
                    nextScript(opt.nextIdx);
                };
                container.appendChild(btn);
            });
        }

        function startCredits() {
            const screen = document.getElementById('credit-screen');
            const content = document.getElementById('credit-content');
            screen.style.display = 'flex';
            content.classList.add('scrolling');
            setTimeout(() => { location.reload(); }, 8100); 
        }

        function openModal(showCloseBtn = true) { 
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-close-btn').style.display = showCloseBtn ? 'block' : 'none';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function openBacklog() {
            openModal(true);
            const body = document.getElementById('modal-body');
            body.innerHTML = `<div style="text-align:left; color:#ddd; line-height:2;">${backlog.join('<br><br>')}</div>`;
            setTimeout(() => { body.scrollTop = body.scrollHeight; }, 10);
        }

        function saveGameMenu() { openModal(true); renderSlots('save'); }
        function loadGameMenu() { openModal(true); renderSlots('load'); }

        function renderSlots(type) {
            const body = document.getElementById('modal-body');
            body.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const slot = document.createElement('div'); 
                slot.className = 'slot hover-active';
                const info = localStorage.getItem('slot_info_' + i);
                slot.innerText = info ? `슬롯 ${i} [${info}]` : `슬롯 ${i} - 비어있음`;
                slot.onclick = () => {
                    if(type === 'save') {
                        const now = new Date();
                        const timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
                        localStorage.setItem('slot_idx_' + i, currentIdx);
                        localStorage.setItem('slot_info_' + i, timeStr);
                        localStorage.setItem('slot_backlog_' + i, JSON.stringify(backlog));
                        localStorage.setItem('slot_aff_A_' + i, aff_A);
                        localStorage.setItem('slot_aff_B_' + i, aff_B);
                        localStorage.setItem('slot_aff_C_' + i, aff_C);
                        localStorage.setItem('slot_ending_title_' + i, currentEndingTitle);
                        alert("저장되었습니다."); renderSlots('save');
                    } else {
                        const idx = localStorage.getItem('slot_idx_' + i);
                        if(idx !== null) {
                            currentIdx = parseInt(idx) - 1;
                            backlog = JSON.parse(localStorage.getItem('slot_backlog_' + i)) || [];
                            aff_A = parseInt(localStorage.getItem('slot_aff_A_' + i)) || 0;
                            aff_B = parseInt(localStorage.getItem('slot_aff_B_' + i)) || 0;
                            aff_C = parseInt(localStorage.getItem('slot_aff_C_' + i)) || 0;
                            currentEndingTitle = localStorage.getItem('slot_ending_title_' + i) || "";
                            document.getElementById('title-screen').style.display = 'none';
                            document.getElementById('play-screen').style.display = 'flex';
                            document.getElementById('game-ui').style.display = 'flex';
                            closeModal(); nextScript();
                        } else { alert("데이터가 없습니다."); }
                    }
                };
                body.appendChild(slot);
            }
        }

        function openSystemMenu() {
            openModal(false);
            document.getElementById('modal-body').innerHTML = `
                <div class="slot hover-active" onclick="openFontSizeMenu()">글자 크기 변경</div>
                <div class="slot hover-active" onclick="location.reload()">타이틀로 돌아가기</div>
                <div class="slot hover-active" style="color:red;" onclick="if(confirm('데이터를 초기화할까요?')){localStorage.clear(); location.reload();}">모든 데이터 삭제</div>
                <div class="slot hover-active" onclick="closeModal()">[ 돌아가기 ]</div>
            `;
        }

        function openFontSizeMenu() {
            openModal(false);
            document.getElementById('modal-body').innerHTML = `
                <div class="slot hover-active" onclick="setGameFontSize('1.1')">작게</div>
                <div class="slot hover-active" onclick="setGameFontSize('1.35')">보통</div>
                <div class="slot hover-active" onclick="setGameFontSize('1.7')">크게</div>
                <div class="slot hover-active" onclick="openSystemMenu()">[ 뒤로가기 ]</div>
            `;
        }

        function setGameFontSize(size) {
            localStorage.setItem('game_font_size', size);
            document.getElementById('game-text').style.fontSize = size + "rem";
            alert("적용되었습니다.");
        }

        function openEndingList() {
            openModal(true);
            const unlocked = JSON.parse(localStorage.getItem('game_endings')) || [];
            const body = document.getElementById('modal-body');
            if (unlocked.length === 0) {
                body.innerHTML = '<p>해금된 엔딩이 없습니다.</p>';
            } else {
                body.innerHTML = unlocked.map(title => `<div class="ending-item">${title}</div>`).join('');
            }
        }

        function openMakerInfo() {
            openModal(true);
            document.getElementById('modal-body').innerHTML = `
                <div style="text-align:center; line-height:2.5;">
                    <p style="font-size:1.4rem; border-bottom:1px solid #555; margin-bottom:15px;">[ 제작 정보 ]</p>
                    <p>기획 및 시나리오 : ???</p>
                    <p>시스템 프로그래밍 : ???</p>
                    <p>엔진 버전 : v1.6</p>
                </div>
            `;
        }
    </script>
</body>
</html>
