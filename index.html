<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니 노벨 뷰어</title>
    <style>
        :root {
            --np-purple: #7b3ce9;
            --np-bg: #ffffff;
            --np-text: #333333;
            --v-bg: #ffffff;
            --v-text: #222222;
        }

        body.dark-mode { --v-bg: #121212; --v-text: #d1d1d1; --nav-bg-rgb: 18, 18, 18; }
        body.light-mode { --nav-bg-rgb: 255, 255, 255; }

        body { 
            margin: 0; padding: 0; width: 240px; 
            background: var(--np-bg); color: var(--np-text); 
            font-family: sans-serif; font-size: 12px;
            overflow-x: hidden;
        }
        
        .tabs { display: flex; border-bottom: 1px solid #ddd; }
        .tab { 
            flex: 1; padding: 10px 0; text-align: center; 
            font-size: 12px; background: #f8f9fa; border-bottom: 1px solid #eee;
        }
        .tab.active { background: #fff; border-bottom: 2px solid var(--np-purple); font-weight: bold; }

        .container { width: 240px; padding: 5px; box-sizing: border-box; }
        
        .book-item { display: flex; padding: 8px 0; border-bottom: 1px solid #eee; align-items: center; }
        .book-cover { width: 40px; height: 55px; background: #eee; margin-right: 8px; flex-shrink: 0; border: 1px solid #ddd; }
        .book-info { flex: 1; min-width: 0; }
        .book-title { font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
        .btn-read { background: var(--np-purple); color: white; border: none; padding: 4px 8px; border-radius: 3px; font-size: 11px; cursor: pointer; }

        .upload-label { background: var(--np-purple); color: white; padding: 8px; display: block; text-align: center; margin: 5px 0; font-size: 18px; font-weight: bold; cursor: pointer; }

        .pagination { display: flex; justify-content: center; gap: 2px; margin: 15px 0; align-items: center; }
        .page-btn { border: 1px solid #ddd; padding: 4px 7px; font-size: 10px; background: #fff; cursor: pointer; min-width: 25px; font-family: monospace; }
        .page-btn.active { background: #000; color: #fff; border-color: #000; }
        .page-btn.disabled { color: #ccc; cursor: default; }

        #viewer-overlay { display: none; position: fixed; top: 0; left: 0; width: 240px; height: 100%; background: var(--v-bg); z-index: 2000; overflow-y: auto; color: var(--v-text); }
        
        #viewer-nav { 
            position: fixed; top: -60px; left: 0; width: 240px; height: 50px; 
            background: rgba(var(--nav-bg-rgb), 0.9); backdrop-filter: blur(5px);
            border-bottom: 2px solid var(--v-text);
            display: flex; align-items: center; justify-content: space-between; padding: 0 5px; box-sizing: border-box; transition: top 0.2s; z-index: 2001; 
        }
        #viewer-nav.show { top: 0; }

        .dot-icon { font-family: monospace; font-size: 11px; font-weight: bold; border: 1px solid var(--v-text); padding: 2px 5px; background: var(--v-bg); cursor: pointer; }
        
        #viewer-content { padding: 15px 10px; line-height: 1.7; font-size: 15px; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body class="light-mode">

<div id="library-view">
    <div class="tabs">
        <div id="tab-fav" class="tab active" onclick="switchTab('fav')">선호작</div>
        <div id="tab-recent" class="tab" onclick="switchTab('recent')">최근 본 작품</div>
    </div>
    
    <div class="container">
        <label class="upload-label"> + <input type="file" id="file-up" style="display:none" accept=".txt"></label>
        <div id="book-list"></div>
        <div id="pagination" class="pagination"></div>
    </div>
</div>

<div id="viewer-overlay" onclick="toggleNav()">
    <nav id="viewer-nav" onclick="event.stopPropagation()">
        <div onclick="closeViewer()"><span class="dot-icon">H</span> <span id="v-title" style="font-size:10px; font-weight:bold; margin-left:3px;">TITLE</span></div>
        <div style="display:flex; gap:3px;">
            <span class="dot-icon" onclick="changeFontSize(-1)">-</span>
            <span class="dot-icon" onclick="changeFontSize(1)">+</span>
            <span class="dot-icon" id="theme-toggle" onclick="toggleTheme()">M</span>
            <span class="dot-icon" onclick="closeViewer()">L</span>
        </div>
    </nav>
    <div id="viewer-content"></div>
</div>

<script>
    let db, books = [], currentBook = null, currentPage = 1, currentMode = 'fav';
    const itemsPerPage = 7; 
    let fontSize = 15;

    const req = indexedDB.open("NovelPia240DB", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("books", { keyPath: "id", autoIncrement: true });
    req.onsuccess = e => { db = e.target.result; loadLibrary(); };

    document.getElementById('file-up').onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const cleanTitle = file.name.replace(/\.txt$/i, '');
            const tx = db.transaction("books", "readwrite");
            tx.objectStore("books").add({ title: cleanTitle, data: ev.target.result, pos: 0, lastRead: 0 });
            tx.oncomplete = loadLibrary;
        };
        reader.readAsText(file);
    };

    function switchTab(mode) {
        currentMode = mode;
        currentPage = 1;
        document.getElementById('tab-fav').classList.toggle('active', mode === 'fav');
        document.getElementById('tab-recent').classList.toggle('active', mode === 'recent');
        loadLibrary();
    }

    function loadLibrary() {
        const tx = db.transaction("books", "readonly");
        tx.objectStore("books").getAll().onsuccess = e => {
            let allBooks = e.target.result;
            books = (currentMode === 'fav') ? allBooks.reverse() : allBooks.filter(b => b.lastRead > 0).sort((a,b)=>b.lastRead - a.lastRead);
            renderBooks();
        };
    }

    function renderBooks() {
        const list = document.getElementById('book-list');
        const pagin = document.getElementById('pagination');
        list.innerHTML = ""; pagin.innerHTML = "";

        if (books.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding:30px; color:#999; font-size:10px;">[ NO DATA ]</div>`;
            return;
        }

        const totalPages = Math.ceil(books.length / itemsPerPage);
        const start = (currentPage - 1) * itemsPerPage;
        books.slice(start, start + itemsPerPage).forEach(book => {
            const item = document.createElement('div');
            item.className = 'book-item';
            item.innerHTML = `
                <div class="book-cover"></div>
                <div class="book-info">
                    <div class="book-title" onclick="openViewer(${book.id})">${book.title}</div>
                </div>
                <button class="btn-read" onclick="openViewer(${book.id})">읽기</button>
            `;
            list.appendChild(item);
        });

        createPageBtn("<<", 1, currentPage === 1);
        createPageBtn("<", currentPage - 1, currentPage === 1);
        
        let startPage = Math.max(1, currentPage - 1);
        let endPage = Math.min(totalPages, startPage + 2);
        if (endPage - startPage < 2) startPage = Math.max(1, endPage - 2);

        for (let i = startPage; i <= endPage; i++) {
            createPageBtn(i, i, false, i === currentPage);
        }

        createPageBtn(">", currentPage + 1, currentPage === totalPages);
        createPageBtn(">>", totalPages, currentPage === totalPages);
    }

    function createPageBtn(text, target, disabled, active = false) {
        const btn = document.createElement('button');
        btn.className = `page-btn ${disabled ? 'disabled' : ''} ${active ? 'active' : ''}`;
        btn.textContent = text;
        if (!disabled) btn.onclick = () => { currentPage = target; renderBooks(); window.scrollTo(0,0); };
        document.getElementById('pagination').appendChild(btn);
    }

    const overlay = document.getElementById('viewer-overlay');
    const vNav = document.getElementById('viewer-nav');
    const vContent = document.getElementById('viewer-content');

    function openViewer(id) {
        db.transaction("books", "readwrite").objectStore("books").get(id).onsuccess = e => {
            currentBook = e.target.result;
            currentBook.lastRead = Date.now();
            db.transaction("books", "readwrite").objectStore("books").put(currentBook);
            document.getElementById('v-title').textContent = currentBook.title.substring(0,6);
            overlay.style.display = 'block';
            vContent.innerText = currentBook.data;
            overlay.scrollTop = currentBook.pos;
        };
    }

    function closeViewer() { overlay.style.display = 'none'; vNav.classList.remove('show'); loadLibrary(); }
    function toggleNav() { vNav.classList.toggle('show'); }
    function changeFontSize(d) { fontSize += d; vContent.style.fontSize = fontSize + 'px'; }
    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-mode');
        document.body.classList.toggle('light-mode', !isDark);
        document.getElementById('theme-toggle').textContent = isDark ? 'S' : 'M';
    }

    overlay.onscroll = () => {
        if (!currentBook) return;
        clearTimeout(window.saveTimer);
        window.saveTimer = setTimeout(() => {
            currentBook.pos = overlay.scrollTop;
            db.transaction("books", "readwrite").objectStore("books").put(currentBook);
        }, 500);
    };
</script>
</body>
</html>
